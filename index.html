<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hot Wheels Racing Series</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=Barlow+Semi+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    /* Dark stock-car scoreboard palette (original, not a brand copy) */
    --bg:#0d0f14;            /* carbon black page */
    --bg2:#12151c;
    --panel:#171b24;         /* raised panel */
    --panel2:#1d222d;
    --line:#2b323f;          /* hairline on dark */
    --line2:#3a4353;
    --ink:#eef1f6;           /* primary text (light on dark) */
    --muted:#8b93a3;         /* secondary text */
    --flag:#e2231a;          /* racing red */
    --flag-dk:#b01109;
    --flag2:#25c274;         /* go-green */
    --gold:#f5c518;          /* checkered gold */
    --steel:#c7ced9;         /* chrome/steel accent */
    --hi:#222836;            /* hover row */
    --accent:#e2231a;
    --radius:6px;
    --mono:'Share Tech Mono',ui-monospace,'SF Mono',Menlo,monospace;
    --disp:'Saira Condensed','Barlow Semi Condensed',system-ui,sans-serif;
    --semi:'Barlow Semi Condensed',system-ui,sans-serif;
    --body:'Barlow',system-ui,sans-serif;
    /* legacy aliases used around the app */
    --paper:var(--bg); --card:var(--panel);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--ink);font-family:var(--body);
    font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;
    background-image:
      linear-gradient(180deg, #0b0d12 0%, #0d0f14 240px);
  }
  a{color:var(--steel)}
  .wrap{max-width:1180px;margin:0 auto;padding:0 20px 80px}

  .team-dot{width:11px;height:11px;border-radius:50%;display:inline-block;flex:none;border:1px solid rgba(255,255,255,.25)}
  .season-switch{display:inline-flex;gap:6px;margin-top:14px}
  .season-switch button{font-family:var(--disp);font-style:italic;font-weight:700;text-transform:uppercase;
    font-size:14px;letter-spacing:.02em;background:var(--panel);color:var(--muted);border:1.5px solid var(--line2);
    border-radius:5px;padding:7px 14px;cursor:pointer;display:flex;flex-direction:column;line-height:1.1;align-items:flex-start}
  .season-switch button small{font-family:var(--mono);font-style:normal;font-weight:400;font-size:9.5px;letter-spacing:.04em;opacity:.7;text-transform:none}
  .season-switch button:hover{color:var(--ink);border-color:var(--steel)}
  .season-switch button.on{background:var(--flag);color:#fff;border-color:var(--flag)}
  .season-switch button.on small{opacity:.9}
  .champ-banner{display:flex;align-items:center;gap:14px;background:linear-gradient(100deg,rgba(245,197,24,.16),rgba(245,197,24,.04));
    border:1px solid rgba(245,197,24,.4);border-left:4px solid var(--gold);border-radius:8px;padding:14px 18px;margin-bottom:18px}
  .champ-banner .trophy{font-size:26px;font-style:normal}
  .champ-banner .champ-k{font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gold)}
  .champ-banner .champ-v{font-family:var(--disp);font-style:italic;font-weight:800;font-size:20px;margin-top:2px;color:#fff}
  .champ-banner .champ-v a{color:#fff}
  .team-logo{border-radius:4px;object-fit:cover;vertical-align:middle;flex:none;background:#fff;border:1px solid var(--line2)}
  .logo-ph{width:28px;height:28px;border-radius:4px;border:1.5px dashed;display:inline-flex;align-items:center;justify-content:center;color:var(--muted);font-family:var(--mono);font-size:12px;flex:none;opacity:.6}
  .carno-cell{display:inline-flex;align-items:center;gap:8px}
  .driver-name{font-family:var(--semi);font-weight:500;color:var(--muted);font-size:12.5px}
  a.carlink{text-decoration:none;color:inherit;cursor:pointer;border-bottom:1.5px solid transparent;transition:border-color .1s,color .1s}
  a.carlink:hover{color:var(--flag);border-bottom-color:var(--flag)}

  /* Roster tiles */
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
  .rtile{background:var(--panel);border:1px solid var(--line);border-top:3px solid var(--flag);border-radius:6px;
    padding:14px;cursor:pointer;transition:transform .1s,border-color .1s,background .1s;position:relative;overflow:hidden}
  .rtile:hover{background:var(--panel2);transform:translateY(-2px)}
  .rtile .bignum{font-family:var(--disp);font-style:italic;font-weight:800;font-size:34px;line-height:1;color:#fff}
  .rtile .rdriver{font-family:var(--semi);font-weight:600;font-size:15px;margin-top:6px;color:var(--ink);min-height:20px}
  .rtile .rteam{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:4px}
  .rtile .rstats{display:flex;gap:12px;margin-top:12px;padding-top:10px;border-top:1px solid var(--line)}
  .rtile .rstat{display:flex;flex-direction:column}
  .rtile .rstat b{font-family:var(--disp);font-style:italic;font-size:18px;color:#fff;line-height:1}
  .rtile .rstat span{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:2px}
  .rtile .rlogo{position:absolute;top:12px;right:12px}

  /* Driver detail */
  .dd-head{display:flex;gap:18px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .dd-num{font-family:var(--disp);font-style:italic;font-weight:800;font-size:64px;line-height:.9;color:#fff}
  .dd-meta h2{font-family:var(--disp);font-style:italic;text-transform:uppercase;margin:0;font-size:30px}
  .dd-back{font-family:var(--semi);font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:12px;
    color:var(--muted);background:none;border:none;cursor:pointer;padding:8px 0;display:inline-flex;gap:6px;align-items:center}
  .dd-back:hover{color:var(--flag)}
  .fin-badge{display:inline-flex;align-items:center;justify-content:center;min-width:26px;height:26px;padding:0 6px;
    border-radius:4px;font-family:var(--disp);font-style:italic;font-weight:800;font-size:14px}
  .fin-1{background:var(--gold);color:#221a00}
  .fin-top5{background:rgba(37,194,116,.2);color:#4ee39a}
  .fin-mid{background:var(--panel2);color:var(--ink)}
  .carno-pill{display:inline-block;font-family:var(--mono);font-size:11px;padding:1px 7px;margin:1px 1px 0 0;
    border:1.5px solid var(--line2);border-radius:20px;background:rgba(255,255,255,.03)}

  /* Header / title */
  header.masthead{
    border-bottom:4px solid var(--flag);margin-bottom:0;
    padding:24px 0 18px;position:relative;overflow:hidden;
    background:linear-gradient(100deg,#14181f 0%,#0d0f14 60%);
  }
  .checker{
    position:absolute;top:0;right:0;width:220px;height:100%;opacity:.14;
    background-image:
      linear-gradient(45deg,var(--ink) 25%,transparent 25%),
      linear-gradient(-45deg,var(--ink) 25%,transparent 25%),
      linear-gradient(45deg,transparent 75%,var(--ink) 75%),
      linear-gradient(-45deg,transparent 75%,var(--ink) 75%);
    background-size:20px 20px;
    background-position:0 0,0 10px,10px -10px,-10px 0;
    pointer-events:none;
  }
  .kicker{
    font-family:var(--mono);font-size:11px;letter-spacing:.34em;
    text-transform:uppercase;color:var(--flag);margin:0 0 6px;font-weight:400;
  }
  h1.title{
    font-family:var(--disp);font-weight:800;font-size:clamp(32px,6vw,58px);
    letter-spacing:.005em;line-height:.9;margin:0;text-transform:uppercase;font-style:italic;
  }
  h1.title .yr{color:var(--flag);font-weight:700;-webkit-text-stroke:0;font-style:normal}
  .sub{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:10px;letter-spacing:.04em}

  /* Nav tabs */
  nav.tabs{
    display:flex;gap:2px;flex-wrap:wrap;border-bottom:2px solid var(--line2);
    margin-bottom:26px;position:sticky;top:0;background:var(--bg);z-index:20;
    padding-top:2px;
  }
  nav.tabs button{
    font-family:var(--disp);font-size:15px;letter-spacing:.04em;text-transform:uppercase;font-weight:600;font-style:italic;
    background:transparent;border:none;border-bottom:3px solid transparent;
    margin-bottom:-2px;padding:12px 16px;cursor:pointer;color:var(--muted);
  }
  nav.tabs button:hover{color:var(--ink);background:var(--panel)}
  nav.tabs button.on{color:#fff;border-bottom-color:var(--flag);background:var(--panel)}

  /* Generic */
  h2.sec{font-family:var(--disp);font-weight:800;font-size:26px;text-transform:uppercase;letter-spacing:.01em;margin:0 0 4px;font-style:italic}
  .lead{color:var(--muted);font-size:13.5px;margin:0 0 20px;max-width:64ch}
  .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
  .grow{flex:1 1 auto}
  .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

  button.btn{
    font-family:var(--disp);font-size:14px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.03em;font-style:italic;
    background:var(--panel2);color:var(--ink);border:1.5px solid var(--line2);
    border-radius:var(--radius);padding:9px 16px;
  }
  button.btn:hover{background:#2a3140;border-color:var(--steel)}
  button.btn.ghost{background:transparent;color:var(--ink)}
  button.btn.ghost:hover{background:var(--panel2)}
  button.btn.flag{background:var(--flag);border-color:var(--flag);color:#fff}
  button.btn.flag:hover{background:var(--flag-dk);border-color:var(--flag-dk)}
  button.btn.sm{padding:5px 10px;font-size:12px;border-radius:5px}
  button.btn:disabled{opacity:.4;cursor:not-allowed}

  input,select{
    font-family:var(--body);font-size:14px;color:var(--ink);background:var(--bg2);
    border:1.5px solid var(--line);border-radius:5px;padding:8px 10px;
  }
  input::placeholder{color:#5c6472}
  input:focus,select:focus{outline:none;border-color:var(--flag);box-shadow:0 0 0 3px rgba(226,35,26,.22)}
  input.num{width:66px;text-align:center;font-family:var(--mono)}
  select option{background:var(--panel);color:var(--ink)}
  label.fld{display:flex;flex-direction:column;gap:5px;font-size:12px;font-weight:600;color:var(--muted)}
  label.fld span{font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase;font-size:10.5px}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px}
  .card + .card{margin-top:16px}

  /* Standings table */
  table.data{width:100%;border-collapse:collapse;font-size:14px}
  table.data th{
    font-family:var(--semi);font-size:11px;letter-spacing:.06em;text-transform:uppercase;
    text-align:right;color:var(--muted);padding:9px 10px;border-bottom:2px solid var(--flag);
    white-space:nowrap;cursor:pointer;user-select:none;font-weight:600;
  }
  table.data th:first-child,table.data th.l{text-align:left}
  table.data th.sortable:hover{color:var(--ink)}
  table.data th .ar{opacity:.5;font-size:9px;color:var(--flag)}
  table.data td{padding:9px 10px;text-align:right;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums}
  table.data td:first-child,table.data td.l{text-align:left}
  table.data tr:hover td{background:var(--hi)}
  .pos{font-family:var(--mono);color:var(--muted);width:34px}
  .carno{font-family:var(--disp);font-weight:700;font-size:16px;font-style:italic}
  .pts{font-weight:800;font-family:var(--disp);color:#fff}
  .cutline td{border-bottom:2px dashed var(--flag)}
  .cutlabel{font-family:var(--disp);font-size:12px;color:var(--flag);letter-spacing:.1em;text-transform:uppercase;font-weight:700;font-style:italic}
  .win-badge{display:inline-block;font-family:var(--mono);font-size:10px;background:var(--gold);color:#221a00;
    padding:1px 6px;border-radius:3px;font-weight:600;margin-left:6px;vertical-align:1px}

  .chip{display:inline-block;font-family:var(--semi);font-size:11px;letter-spacing:.05em;text-transform:uppercase;font-weight:600;
    padding:2px 9px;border-radius:3px;border:1px solid var(--line2);color:var(--muted)}
  .chip.long{background:rgba(37,194,116,.14);border-color:rgba(37,194,116,.4);color:#4ee39a}
  .chip.short{background:rgba(226,35,26,.14);border-color:rgba(226,35,26,.4);color:#ff6b63}
  .chip.intermediate{background:rgba(245,197,24,.14);border-color:rgba(245,197,24,.4);color:#f5d76e}
  .chip.road{background:rgba(120,150,255,.14);border-color:rgba(120,150,255,.4);color:#9db0ff}
  .chip.playoff{background:var(--gold);color:#221a00;border-color:var(--gold);font-weight:700}

  .empty{text-align:center;padding:44px 20px;color:var(--muted);font-size:14px}
  .empty i{font-size:30px;display:block;margin-bottom:8px;opacity:.5}

  /* Race entry grid */
  .grid-entry{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;margin-top:12px}
  .entry-row{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;
    padding:6px 8px;border-radius:4px;transition:background .1s}
  .entry-row:hover{background:var(--hi)}
  .entry-row .lab{font-family:var(--disp);font-weight:700;font-size:16px;min-width:48px;font-style:italic;display:flex;align-items:center;gap:6px}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--flag);color:#fff;padding:12px 22px;border-radius:var(--radius);
    font-family:var(--disp);font-size:14px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;font-style:italic;
    box-shadow:0 8px 26px rgba(0,0,0,.5);z-index:100;
    opacity:0;pointer-events:none;transition:opacity .18s,transform .18s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  .stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:22px}
  .stat{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--flag);border-radius:4px;padding:12px 14px}
  .stat .k{font-family:var(--semi);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .stat .v{font-family:var(--disp);font-weight:800;font-size:28px;line-height:1.1;margin-top:3px;font-style:italic;color:#fff}
  .stat .v small{font-size:13px;color:var(--muted);font-weight:600;font-style:normal}

  details.rulebox{border:1px solid var(--line);border-radius:5px;background:var(--panel);margin-bottom:10px}
  details.rulebox summary{cursor:pointer;padding:12px 16px;font-weight:700;font-family:var(--disp);color:var(--ink);
    text-transform:uppercase;font-size:16px;letter-spacing:.02em;list-style:none;font-style:italic}
  details.rulebox summary::-webkit-details-marker{display:none}
  details.rulebox summary::before{content:'+';color:var(--flag);font-weight:800;margin-right:10px}
  details.rulebox[open] summary::before{content:'\2013'}
  details.rulebox .body{padding:0 16px 16px;font-size:14px;color:#c3c9d4}
  details.rulebox .body p{margin:8px 0}

  .flex-head{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:16px;flex-wrap:wrap}

  .mini{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .divider{height:1px;background:var(--line);margin:18px 0}
  .pill-toggle{display:inline-flex;border:1.5px solid var(--line2);border-radius:4px;overflow:hidden}
  .pill-toggle button{border:none;background:transparent;font-family:var(--semi);font-size:12px;font-weight:600;
    text-transform:uppercase;letter-spacing:.05em;padding:6px 14px;cursor:pointer;color:var(--muted)}
  .pill-toggle button.on{background:var(--flag);color:#fff}

  .h2h{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;max-width:420px}
  .vs{font-family:var(--disp);font-weight:800;color:var(--flag);font-style:italic;text-transform:uppercase}
  .fightlist{display:flex;flex-direction:column;gap:6px;margin-top:14px}
  .fightrow{display:grid;grid-template-columns:1fr auto 1fr auto;gap:10px;align-items:center;
    padding:8px 12px;border:1px solid var(--line);border-radius:5px;background:var(--bg2);font-size:13px}
  .fightrow .w{font-weight:700;font-family:var(--disp);font-style:italic;color:#fff}
  .fightrow .l{color:var(--muted);font-family:var(--disp);text-align:right;font-style:italic}

  @media(max-width:720px){
    .grid-entry{grid-template-columns:1fr}
    table.data th.hide-sm,table.data td.hide-sm{display:none}
  }
</style>
</head>
<body>
<a class="sr-only">Hot Wheels Racing Series league manager: standings, schedule, race entry, and stats.</a>

<header class="masthead">
  <div class="checker"></div>
  <div class="wrap">
    <p class="kicker">Official League Manager</p>
    <h1 class="title">Hot Wheels<br>Racing Series <span class="yr" id="seasonLabel">2025–26</span></h1>
    <p class="sub" id="tagline">Loading season…</p>
    <p class="sub" id="syncState" style="margin-top:2px">● connecting…</p>
    <div id="seasonSwitch" class="season-switch"></div>
  </div>
  <div style="height:6px;display:flex">
    <div style="flex:1;background:var(--flag)"></div>
    <div style="flex:1;background:var(--gold)"></div>
    <div style="flex:1;background:var(--steel)"></div>
    <div style="flex:3;background:var(--panel)"></div>
  </div>
</header>

<nav class="tabs" id="tabs">
  <div class="wrap" style="display:flex;gap:2px;flex-wrap:wrap;padding:0 20px">
    <button data-tab="standings" class="on">Standings</button>
    <button data-tab="schedule">Schedule</button>
    <button data-tab="enter">Enter Race</button>
    <button data-tab="cars">Cars</button>
    <button data-tab="drivers">Drivers</button>
    <button data-tab="teams">Teams</button>
    <button data-tab="fights">Fights</button>
    <button data-tab="rules">Rulebook</button>
    <button data-tab="data">Data</button>
  </div>
</nav>

<div class="wrap">
  <section id="view"></section>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
   Hot Wheels Racing Series — league engine
   All data persists via window.storage (per-user).
   ============================================================ */

const POINTS = {1:18,2:14,3:13,4:12,5:11,6:9,7:8,8:7,9:6,10:5,11:3,12:2,13:1,14:1,15:1,16:1};
const BONUS  = {1:9,2:8,3:7,4:6,5:5,6:4,7:3,8:2,9:1,10:1};
function pointsForFinish(f){ return POINTS[f] != null ? POINTS[f] : 1; } // 17th+ = 1

// Distinct, high-contrast team colors (readable as row highlights in both modes).
const TEAM_PALETTE = ['#e11a2c','#f5a623','#f8e71c','#1a9e57','#00a3c4','#2d5bd7','#7b4dd8','#e0559e','#ff6b1f','#12b886','#845ef7','#c92a2a','#0ca678','#4263eb','#d6336c','#f76707'];
function teamByName(name){ return (DB.teams||[]).find(t=>t.name===name) || null; }
function teamColor(name){ const t=teamByName(name); return t? t.color : null; }
function carTeamColor(num){ const c=DB.cars.find(x=>x.num===num); return c && c.team ? teamColor(c.team) : null; }
// Low-opacity tint of a hex color for row backgrounds (works over light/dark via rgba).
function hexTint(hex, a=0.12){
  const h=hex.replace('#',''); const n=parseInt(h.length===3? h.split('').map(x=>x+x).join(''):h,16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
// Driver name for a car, or '' if none.
function carDriver(num){ const c=DB.cars.find(x=>x.num===num); return c && c.driver ? c.driver : ''; }
// Team logo (base64 data URI) for a car's team, or null.
function carTeamLogo(num){ const c=DB.cars.find(x=>x.num===num); if(!c||!c.team) return null; const t=teamByName(c.team); return t && t.logo ? t.logo : null; }
// Small logo <img> markup for inline use, or '' if none.
function logoImg(num, size=20){ const src=carTeamLogo(num); return src? `<img class="team-logo" src="${src}" style="width:${size}px;height:${size}px" alt="">` : ''; }
// Downscale an uploaded image file to a square dataURL (~maxpx), returned via callback.
function downscaleImage(file, maxpx, cb){
  const reader=new FileReader();
  reader.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const side=Math.min(img.width, img.height);          // center-crop to square
      const sx=(img.width-side)/2, sy=(img.height-side)/2;
      const cv=document.createElement('canvas'); cv.width=maxpx; cv.height=maxpx;
      const ctx=cv.getContext('2d');
      ctx.drawImage(img, sx, sy, side, side, 0, 0, maxpx, maxpx);
      cb(cv.toDataURL('image/png'));
    };
    img.onerror=()=>cb(null);
    img.src=reader.result;
  };
  reader.onerror=()=>cb(null);
  reader.readAsDataURL(file);
}

// ===== 2024 season (S1) imported from Hotwheel Stats 2024.xlsx race sheets =====

  get(_, prop){

/* ---------- storage layer ---------- */
async function loadDB(){
  if(CONFIGURED){
    try{
      sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const {data, error} = await sb.from('leagues').select('data').eq('id', LEAGUE_ID).maybeSingle();
      if(error) throw error;
      if(data && data.data){ DB_ROOT = migrateToSeasons(data.data); }
      else { DB_ROOT = seedRoot(); await pushDB(); }   // first ever load → seed the shared row
      subscribeRealtime();
      return;
    }catch(e){
      console.error(e);
      toast('Cloud connect failed — using local mode');
    }
  }
  try{
    const raw = localStorage.getItem('hwrs:v1');
    if(raw){ DB_ROOT = migrateToSeasons(JSON.parse(raw)); return; }
  }catch(e){}
  DB_ROOT = seedRoot(); saveLocal();
}

function saveLocal(){
  try{ localStorage.setItem('hwrs:v1', JSON.stringify(DB_ROOT)); }catch(e){}
}
async function pushDB(){
  if(!sb) return;
  const {error} = await sb.from('leagues').upsert({id:LEAGUE_ID, data:DB_ROOT, updated_at:new Date().toISOString()});
  if(error){ console.error(error); toast('Save failed — check connection'); }
}
async function saveDB(){
  saveLocal();
  if(applyingRemote) return;
  if(sb){ clearTimeout(saveTimer); saveTimer = setTimeout(pushDB, 400); }
}
function subscribeRealtime(){
  if(!sb) return;
  sb.channel('league-'+LEAGUE_ID)
    .on('postgres_changes',
        {event:'*', schema:'public', table:'leagues', filter:'id=eq.'+LEAGUE_ID},
        payload=>{
          const incoming = payload.new && payload.new.data;
          if(!incoming) return;
          applyingRemote = true;
          DB_ROOT = migrateToSeasons(incoming);
          render();
          applyingRemote = false;
          setSyncDot(true);
        })
    .subscribe();
}

// Canonical car-number aliases. 0 1/2 and 0.5 are the SAME car; 07≠7 and 03≠3 stay distinct.
const CAR_ALIASES = { '0.5':'0 1/2' };
function canonNum(n){ return CAR_ALIASES[n] || n; }
// Rewrite every car number in a season to its canonical form (idempotent).
function normalizeSeasonNums(season){
  (season.cars||[]).forEach(c=>{ c.num = canonNum(c.num); });
  (season.races||[]).forEach(r=>{
    if(r.phase==null) r.phase = r.playoff ? 'playoff' : 'regular';   // migrate old boolean
    if(r.entries) r.entries = r.entries.map(canonNum);
    if(r.results) r.results.forEach(x=>{ x.num = canonNum(x.num); });
  });
  (season.fights||[]).forEach(f=>{ f.winner=canonNum(f.winner); f.loser=canonNum(f.loser); });
  // metric defaults for older season objects
  if(!season.regularMetric) season.regularMetric = (season.id==='S1') ? 'avgFinish' : 'points';
  if(!season.playoffMetric) season.playoffMetric = season.regularMetric;
  if(season.playoffComplete==null) season.playoffComplete = (season.id==='S1');
  return season;
}

// Convert any older shape into the season structure. Idempotent.
function migrateToSeasons(data){
  let root;
  if(data && data.schema>=2 && Array.isArray(data.seasons)){ root = data; }
  else {
    const s2 = {
      id:'S2', label:'Season 2', year:'2025–26', hasLaps:false,
      regularCount: data.regularCount||28, playoffCount: data.playoffCount||4,
      cars: data.cars||[], races: data.races||[], teams: data.teams||[], fights: data.fights||[]
    };
    root = { schema:2, activeSeason:'S2', seasons:[ seedS1(), s2 ] };
  }
  // Normalize car numbers + propagate league-wide driver names every load.
  root.seasons.forEach(normalizeSeasonNums);
  applyLeagueDrivers(root);
  return root;
}

// Driver names are league-wide (keyed by canonical car number). We keep a root-level
// map and mirror it onto each season's car rows so all existing per-season code works.
function applyLeagueDrivers(root){
  if(!root.drivers) root.drivers = {};   // { canonicalNum: "Driver Name" }
  // Seed the map from any existing per-car driver names (first non-empty wins).
  root.seasons.forEach(s=> (s.cars||[]).forEach(c=>{
    if(c.driver && !root.drivers[c.num]) root.drivers[c.num] = c.driver;
  }));
  // Mirror back onto every season's car rows.
  root.seasons.forEach(s=> (s.cars||[]).forEach(c=>{
    if(root.drivers[c.num]) c.driver = root.drivers[c.num];
  }));
}
// Set a driver name league-wide and re-mirror.
function setDriverName(num, name){
  const n = canonNum(num);
  if(!DB_ROOT.drivers) DB_ROOT.drivers = {};
  if(name) DB_ROOT.drivers[n] = name; else delete DB_ROOT.drivers[n];
  DB_ROOT.seasons.forEach(s=> (s.cars||[]).forEach(c=>{ if(c.num===n) c.driver = name; }));
}

// Career stats for a car across ALL seasons. Points are season-scoped, so career
// points = sum of each season's points; other stats aggregate over all races.
function careerStats(num){
  const perSeason = [];
  let cRaces=0, cWins=0, cStartSum=0, cStartCnt=0, cFinSum=0, cPts=0, cDiff=0, cTop=0;
  DB_ROOT.seasons.forEach(season=>{
    let pts=0, races=0, wins=0, startSum=0, startCnt=0, finSum=0, diff=0, best=null;
    season.races.forEach(r=>{
      if(!r.results) return;
      const res = r.results.find(x=>x.num===num);
      if(!res) return;
      races++; finSum+=res.finish; pts+=pointsForFinish(res.finish);
      if(res.finish===1) wins++;
      if(res.start!=null){ startSum+=res.start; startCnt++; diff += (res.start-res.finish); }
      if(best===null || res.finish<best) best=res.finish;
    });
    if(races>0){
      perSeason.push({
        id:season.id, label:season.label, year:season.year, hasLaps:season.hasLaps,
        races, wins, pts, diff, best,
        avgStart: startCnt? startSum/startCnt : null,
        avgFinish: races? finSum/races : null
      });
      cRaces+=races; cWins+=wins; cPts+=pts; cDiff+=diff;
      cStartSum+=startSum; cStartCnt+=startCnt; cFinSum+=finSum;
    }
  });
  return {
    perSeason,
    career:{
      races:cRaces, wins:cWins, pts:cPts, diff:cDiff,
      avgStart: cStartCnt? cStartSum/cStartCnt : null,
      avgFinish: cRaces? cFinSum/cRaces : null,
      seasons: perSeason.length
    }
  };
}

/* ---------- computed standings ---------- */
// Each race carries its original number (creation order, 1-based) so references stay stable.
// Display order can be chronological, but the number never changes.
function racesWithNumbers(){
  return DB.races.map((r,idx)=>({r, num:idx+1}));
}
// Races in chronological display order, each keeping its original number.
// Dated races sort earliest→latest; undated keep original order at the end.
function sortedRaces(){
  return racesWithNumbers()
    .sort((a,b)=>{
      const da=a.r.date||'', db=b.r.date||'';
      if(da && db) return da<db? -1 : da>db? 1 : a.num-b.num;
      if(da && !db) return -1;
      if(!da && db) return 1;
      return a.num-b.num;
    });
}
// Suggest which unscored race to run next: the one whose field contains the most
// cars that have raced the fewest times so far (spreads participation evenly).
function suggestNextRace(){
  const runCount = {};
  DB.cars.forEach(c=> runCount[c.num]=0);
  DB.races.forEach(r=>{ if(r.results) r.results.forEach(x=>{ runCount[x.num]=(runCount[x.num]||0)+1; }); });
  const unscored = racesWithNumbers().filter(({r})=> !r.results && (r.entries&&r.entries.length));
  if(!unscored.length) return null;
  const minRuns = Math.min(...Object.values(runCount));
  // score each unscored race by how many of its entrants sit at (or near) the fewest races run
  let best=null;
  unscored.forEach(({r,num})=>{
    let underRaced=0, totalDeficit=0;
    r.entries.forEach(n=>{
      const rc = runCount[n]||0;
      if(rc===minRuns) underRaced++;
      totalDeficit += (Math.max(...Object.values(runCount)) - rc);
    });
    const score = underRaced*1000 + totalDeficit; // prioritize count at min, break ties by aggregate deficit
    if(!best || score>best.score) best={race:r, num, underRaced, score};
  });
  return best;
}

function computeStandings(opts={}){
  const {playoffOnly=false, regularOnly=false, metric=null} = opts;
  const map = {}; // num -> agg
  function ensure(num){
    if(!map[num]) map[num]={num, pts:0, races:0, wins:0, startSum:0, startCnt:0, finSum:0, top16:0};
    return map[num];
  }
  for(const r of DB.races){
    if(!r.results) continue;
    const isPlayoff = r.phase==='playoff';
    if(playoffOnly && !isPlayoff) continue;
    if(regularOnly && isPlayoff) continue;
    for(const res of r.results){
      const a = ensure(res.num);
      a.pts += pointsForFinish(res.finish);
      a.races += 1;
      if(res.finish === 1) a.wins += 1;
      if(res.finish <= 16) a.top16 += 1;
      if(res.start != null){ a.startSum += res.start; a.startCnt += 1; }
      a.finSum += res.finish;
    }
  }
  const rows = Object.values(map).map(a=>({
    num:a.num, pts:a.pts, races:a.races, wins:a.wins, top16:a.top16,
    avgStart: a.startCnt ? a.startSum/a.startCnt : null,
    avgFinish: a.races ? a.finSum/a.races : null,
    diff: (a.startCnt ? a.startSum : 0) - a.finSum // start - finish summed (positive = gained)
  }));
  // Rank metric: 'points' (sum, higher better) or 'avgFinish' (rate, lower better).
  const useMetric = metric || (activeSeasonObj() ? activeSeasonObj().regularMetric : 'points');
  if(useMetric==='avgFinish'){
    rows.sort((x,y)=> (x.avgFinish??99) - (y.avgFinish??99) || y.wins - x.wins || y.diff - x.diff);
  } else {
    rows.sort((x,y)=> y.pts - x.pts || y.diff - x.diff || y.wins - x.wins || (x.avgFinish??99) - (y.avgFinish??99));
  }
  return rows;
}

// Does the active season have any playoff races?
function seasonHasPlayoffs(){ return DB.races.some(r=>r.phase==='playoff'); }
// Are all regular-season races scored (i.e., playoffs may begin)?
function regularSeasonComplete(){
  const reg = DB.races.filter(r=>r.phase==='regular');
  return reg.length>0 && reg.every(r=>r.results);
}
// Standings for a given phase, ranked by that phase's metric.
function phaseStandings(phase){
  const s = activeSeasonObj();
  const metric = phase==='playoff' ? s.playoffMetric : s.regularMetric;
  return computeStandings(phase==='playoff' ? {playoffOnly:true, metric} : {regularOnly:true, metric});
}
// The champion (or provisional leader) for the active season, or null if not applicable.
function seasonChampion(){
  const s = activeSeasonObj();
  if(!seasonHasPlayoffs()) return null;
  const anyPlayoffScored = DB.races.some(r=>r.phase==='playoff' && r.results);
  if(!anyPlayoffScored) return null;
  const rows = phaseStandings('playoff');
  if(!rows.length) return null;
  return { num: rows[0].num, provisional: !s.playoffComplete, metric: s.playoffMetric, row: rows[0] };
}

/* ---------- playoff projection (Monte Carlo, runs in-browser) ----------
   For each unscored race we randomly order its entered field, weighting each
   car by its season form (lower avg finish = more likely to finish up front).
   Repeat many times; tally how often each car ends the season in the top 16,
   and record where the 16th-place points total lands (the projected cutoff). */
function simulatePlayoffs(iters=3000){
  const cutIdx = 15; // 16th place, zero-based
  // current standings snapshot
  const base = {}; // num -> current points
  const form = {}; // num -> avg finish (for weighting); default 8.5 (mid of 16)
  computeStandings().forEach(r=>{ base[r.num]=r.pts; form[r.num]= r.avgFinish!=null? r.avgFinish : 8.5; });
  // ensure every active/entered car exists in base even with 0 races
  const allNums = new Set();
  DB.cars.filter(c=>c.active).forEach(c=>allNums.add(c.num));
  const unscored = DB.races.filter(r=>!r.results);
  unscored.forEach(r=> (r.entries||[]).forEach(n=>allNums.add(n)));
  allNums.forEach(n=>{ if(base[n]==null) base[n]=0; if(form[n]==null) form[n]=8.5; });

  const madeCount = {}; allNums.forEach(n=> madeCount[n]=0);
  let cutlineSum = 0;

  // weighted-shuffle: sample a finishing order where stronger cars tend to place higher
  function simRace(entries){
    // weight = inverse of form (better/lower avg finish → higher weight)
    const pool = entries.map(n=>({n, w: 1/Math.max(0.5, form[n]||8.5)}));
    const order = [];
    const p = pool.slice();
    while(p.length){
      let tot=0; for(const x of p) tot+=x.w;
      let pick=Math.random()*tot, k=0;
      for(; k<p.length; k++){ pick-=p[k].w; if(pick<=0) break; }
      if(k>=p.length) k=p.length-1;
      order.push(p[k].n); p.splice(k,1);
    }
    return order; // order[0] = 1st place
  }

  for(let it=0; it<iters; it++){
    const pts = Object.assign({}, base);
    for(const r of unscored){
      const field = (r.entries&&r.entries.length)? r.entries : [];
      if(!field.length) continue;
      const order = simRace(field);
      order.forEach((n,i)=>{ pts[n] = (pts[n]||0) + pointsForFinish(i+1); });
    }
    const ranked = Object.entries(pts).sort((a,b)=> b[1]-a[1]);
    for(let i=0;i<ranked.length && i<=cutIdx;i++){ if(i<=cutIdx) madeCount[ranked[i][0]] = (madeCount[ranked[i][0]]||0); }
    ranked.slice(0, cutIdx+1).forEach(([n])=> madeCount[n]++);
    cutlineSum += (ranked[cutIdx]? ranked[cutIdx][1] : 0);
  }

  const odds = {};
  allNums.forEach(n=> odds[n] = madeCount[n]/iters);
  return { odds, projectedCutoff: Math.round(cutlineSum/iters), racesLeft: unscored.length, iters };
}
