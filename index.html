  if(ss){
    ss.innerHTML = DB_ROOT.seasons.map(s=>
      `<button class="${s.id===DB_ROOT.activeSeason?'on':''}" data-season="${s.id}">${esc(s.label)}<small>${esc(s.year)}</small></button>`
    ).join('');
    ss.querySelectorAll('button[data-season]').forEach(b=>{
      b.onclick=()=>{ driverDetailNum=null; setActiveSeason(b.dataset.season); };
    });
  }
  const scored = DB.races.filter(r=>r.results).length;
  document.getElementById('tagline').textContent =
    `${DB.cars.filter(c=>c.active).length} cars · ${scored} of ${DB.races.length} races scored · top 16 make the playoffs`;
  if(driverDetailNum!=null){
    renderDriverDetail(driverDetailNum);
    bindCarLinks();
    return;
  }
  ({standings:renderStandings, schedule:renderSchedule, enter:renderEnter,
    cars:renderCars, drivers:renderDrivers, teams:renderTeams, fights:renderFights, rules:renderRules, data:renderData}[currentTab])();
  bindCarLinks();
}

/* ===== STANDINGS ===== */
let standingsPhase = 'regular';   // 'regular' | 'playoff'
function renderStandings(){
  const season = activeSeasonObj();
  const hasPO = seasonHasPlayoffs();
  const poVisible = hasPO && (season.id!=='S2' || regularSeasonComplete());  // S2 playoffs hidden until reg season done
  if(standingsPhase==='playoff' && !poVisible) standingsPhase='regular';

  const metric = standingsPhase==='playoff' ? season.playoffMetric : season.regularMetric;
  const byPoints = metric==='points';
  const rows = phaseStandings(standingsPhase);

  // sort (respect metric default; column clicks override)
  const k = sortState.key, dir = sortState.dir;
  function tiebreak(a,b){
    return byPoints
      ? (b.pts-a.pts || b.diff-a.diff || b.wins-a.wins || (a.avgFinish??99)-(b.avgFinish??99))
      : ((a.avgFinish??99)-(b.avgFinish??99) || b.wins-a.wins || b.diff-a.diff);
  }
  const defaultKey = byPoints ? 'pts' : 'avgFinish';
  const isDefault = (k===defaultKey && (byPoints? dir===-1 : dir===1)) || k==='pts' && byPoints;
  const sorted = isDefault ? [...rows].sort(tiebreak) : [...rows].sort((a,b)=>{
    let av=a[k], bv=b[k];
    if(av==null) av = dir<0? -Infinity: Infinity;
    if(bv==null) bv = dir<0? -Infinity: Infinity;
    return (av<bv?-1:av>bv?1:0)*dir || tiebreak(a,b);
  });

  const totalRaces = DB.races.filter(r=>r.results).length;
  const regRaces = DB.races.filter(r=>r.phase==='regular');
  const regScored = regRaces.filter(r=>r.results).length;

  // Monte-Carlo projection only for points-based regular season with races left
  let proj = null;
  if(standingsPhase==='regular' && byPoints && regScored>0 && regScored<regRaces.length){
    proj = simulatePlayoffs(3000);
  }

  const phaseToggle = poVisible ? `
    <div class="pill-toggle" role="group" aria-label="Season phase">
      <button class="${standingsPhase==='regular'?'on':''}" data-phase="regular">Regular season</button>
      <button class="${standingsPhase==='playoff'?'on':''}" data-phase="playoff">Playoffs</button>
    </div>` : '';

  // Champion / provisional banner (playoff view only)
  const champ = seasonChampion();
  const champBanner = (standingsPhase==='playoff' && champ) ? `
    <div class="champ-banner">
      <i class="trophy">🏆</i>
      <div>
        <div class="champ-k">${champ.provisional? 'Provisional Leader':'Champion'} · ${esc(season.label)} (${esc(season.year)})</div>
        <div class="champ-v">${carLink(champ.num,'carlink')}${carDriver(champ.num)?` — ${esc(carDriver(champ.num))}`:''} · ${champ.metric==='avgFinish'? 'avg finish '+fmt(champ.row.avgFinish) : champ.row.pts+' pts'}</div>
      </div>
    </div>` : '';

  const th = (key,label,cls='')=>`<th class="sortable ${cls}" data-sort="${key}">${label}${sortState.key===key?` <span class="ar">${sortState.dir<0?'▼':'▲'}</span>`:''}</th>`;

  // Stat cards differ by metric
  const leader = rows[0];
  const statCards = leader ? `
    <div class="stat-cards">
      <div class="stat"><div class="k">${byPoints?'Points Leader':'Best Avg Finish'}</div><div class="v">${carLink(leader.num,'carlink')}</div></div>
      <div class="stat"><div class="k">${byPoints?'Leader Points':'Avg Finish'}</div><div class="v">${byPoints? leader.pts : fmt(leader.avgFinish)}</div></div>
      <div class="stat"><div class="k">${standingsPhase==='playoff'?'Playoff Races':'Races Scored'}</div><div class="v">${standingsPhase==='playoff'? DB.races.filter(r=>r.phase==='playoff'&&r.results).length : regScored}<small> / ${standingsPhase==='playoff'? DB.races.filter(r=>r.phase==='playoff').length : regRaces.length}</small></div></div>
      ${proj
        ? `<div class="stat"><div class="k">Projected Cutoff</div><div class="v">${proj.projectedCutoff}<small> pts · ${proj.racesLeft} left</small></div></div>`
        : `<div class="stat"><div class="k">Most Wins</div><div class="v">${carLink([...rows].sort((a,b)=>b.wins-a.wins)[0]?.num||'—','carlink')} <small>${[...rows].sort((a,b)=>b.wins-a.wins)[0]?.wins||0}W</small></div></div>`}
    </div>` : '';

  function oddsCell(num){
    if(!proj) return '';
    const p = proj.odds[num];
    if(p==null) return `<td class="hide-sm mini">—</td>`;
    const pct = p>=0.995?'99%+' : p<=0.005 && p>0 ? '<1%' : Math.round(p*100)+'%';
    const col = p>=0.85?'var(--flag2)' : p>=0.4?'var(--gold)' : p>0.1?'var(--muted)':'var(--flag)';
    return `<td class="hide-sm" style="color:${col};font-weight:600">${pct}</td>`;
  }

  // Playoff view for avgFinish seasons shows per-race finishes (Race 1/2/3) + Avg
  const isAvgPlayoff = standingsPhase==='playoff' && !byPoints;
  const poRaces = isAvgPlayoff ? DB.races.filter(r=>r.phase==='playoff' && r.results) : [];
  function poFinishes(num){
    return poRaces.map(r=>{ const res=r.results.find(x=>x.num===num); return res? res.finish : '—'; });
  }

  let head, bodyRows='';
  if(isAvgPlayoff){
    head = `<tr><th class="l" style="width:34px">#</th><th class="l">Car</th>
      ${poRaces.map((r,i)=>`<th>R${i+1}</th>`).join('')}
      <th>Avg</th></tr>`;
    sorted.forEach((r,i)=>{
      const champRow = i===0 ? ' style="background:rgba(245,197,24,.12)"':'';
      bodyRows += `<tr${champRow}>
        <td class="pos">${i===0? '🏆' : i+1}</td>
        <td class="l"><span class="carno-cell">${logoImg(r.num)}<span>${carLink(r.num)}${carDriver(r.num)?`<br><span class="driver-name">${esc(carDriver(r.num))}</span>`:''}</span></span></td>
        ${poFinishes(r.num).map(f=>`<td>${f===1?`<span class="fin-badge fin-1">1</span>`:f}</td>`).join('')}
        <td class="pts">${fmt(r.avgFinish)}</td>
      </tr>`;
    });
  } else {
    head = `<tr>
      <th class="l" style="width:34px">#</th><th class="l">Car</th>
      ${byPoints? th('pts','Pts') : ''}
      ${th('races','Races')}
      ${th('wins','Wins','hide-sm')}
      ${th('avgStart','Avg St','hide-sm')}
      ${th('avgFinish','Avg Fin')}
      ${th('diff','Diff')}
      ${proj?`<th class="hide-sm l" title="Simulated chance of finishing top 16">Playoff %</th>`:''}
    </tr>`;
    const showCut = standingsPhase==='regular' && byPoints;
    sorted.forEach((r,i)=>{
      const cutline = (showCut && i===15 && sorted.length>16) ? ' cutline' : '';
      bodyRows += `<tr class="${cutline}">
        <td class="pos">${i+1}</td>
        <td class="l"><span class="carno-cell">${logoImg(r.num)}<span>${carLink(r.num)}${r.wins?`<span class="win-badge">${r.wins}W</span>`:''}${carDriver(r.num)?`<br><span class="driver-name">${esc(carDriver(r.num))}</span>`:''}</span></span></td>
        ${byPoints?`<td class="pts">${r.pts}</td>`:''}
        <td>${r.races}</td>
        <td class="hide-sm">${r.wins}</td>
        <td class="hide-sm">${fmt(r.avgStart)}</td>
        <td>${fmt(r.avgFinish)}</td>
        <td>${r.diff>0?'+':''}${r.diff}</td>
        ${oddsCell(r.num)}
      </tr>`;
      if(showCut && i===15 && sorted.length>16){
        const span = 6 + (byPoints?1:0) + (proj?1:0);
        bodyRows += `<tr><td colspan="${span}" style="text-align:center;padding:4px 0"><span class="cutlabel">— playoff cut line · top 16 —</span></td></tr>`;
      }
    });
  }

  const metricNote = byPoints
    ? 'Ranked by points. Ties broken by differential.'
    : 'Ranked by average finish (lowest wins) — this season used no points.';

  view.innerHTML = `
    <div class="flex-head">
      <div>
        <h2 class="sec">Standings</h2>
        <p class="lead" style="margin:0">${metricNote}${standingsPhase==='playoff'&&!byPoints?' Playoff champion = lowest average across the playoff races.':''}</p>
      </div>
      ${phaseToggle}
    </div>
    ${champBanner}
    ${statCards}
    ${sorted.length? `
    <div class="card" style="padding:6px 4px">
      <table class="data"><thead>${head}</thead><tbody>${bodyRows}</tbody></table>
    </div>
    ${proj?`<p class="mini" style="margin-top:10px">Playoff % and projected cutoff come from ${proj.iters.toLocaleString()} simulations of the ${proj.racesLeft} remaining regular-season race${proj.racesLeft===1?'':'s'}, weighting each car by current form.</p>`:''}
    ` : `<div class="empty"><i>🏁</i>${standingsPhase==='playoff'?'No playoff races scored yet.':'No races scored yet. Head to <strong>Enter Race</strong> to log your first result.'}</div>`}
  `;

  view.querySelectorAll('th.sortable').forEach(th=>{
    th.onclick = ()=>{
      const key = th.dataset.sort;
      if(sortState.key===key) sortState.dir *= -1;
      else sortState = {key, dir: (key==='avgFinish'||key==='avgStart')? 1 : -1};
      renderStandings();
    };
  });
  view.querySelectorAll('[data-phase]').forEach(b=>{
    b.onclick=()=>{ standingsPhase=b.dataset.phase; sortState={key:'pts',dir:-1}; renderStandings(); bindCarLinks(); };
  });
  bindCarLinks();
}

/* ===== SCHEDULE ===== */
function renderSchedule(){
  const rows = sortedRaces().map(({r, num})=>{
    const scored = !!r.results;
    const winner = scored ? r.results.find(x=>x.finish===1)?.num : null;
    return `<tr>
      <td class="pos">${num}</td>
      <td class="l">
        <input data-f="name" data-id="${r.id}" value="${esc(r.name)}" style="width:100%;max-width:280px">
      </td>
      <td class="l">
        <select data-f="type" data-id="${r.id}">
          ${['short','intermediate','long','road'].map(t=>`<option value="${t}" ${r.type===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </td>
      <td class="l"><input type="date" data-f="date" data-id="${r.id}" value="${esc(r.date||'')}"></td>
      <td class="l"><label class="mini" style="cursor:pointer"><input type="checkbox" data-f="phase" data-id="${r.id}" ${r.phase==='playoff'?'checked':''}> PO</label></td>
      <td>${scored?`<span class="chip" style="padding-right:4px">${carLink(winner,'carlink')} won</span>`:`<span class="mini">—</span>`}</td>
      <td class="l">
        <button class="btn ghost sm" data-goto="${r.id}">${scored?'Edit':'Enter'}</button>
        <button class="btn ghost sm" data-del="${r.id}" title="Remove race">✕</button>
      </td>
    </tr>`;
  }).join('');

  const sug = suggestNextRace();
  const sugBanner = sug ? `
    <div class="card" style="border-left:3px solid var(--gold);display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap">
      <div>
        <div class="mini" style="color:var(--gold);letter-spacing:.1em;text-transform:uppercase;font-weight:600">Suggested next race</div>
        <div style="font-family:var(--disp);font-style:italic;font-weight:700;font-size:19px;margin-top:2px">Race ${sug.num} · ${esc(sug.race.name)}</div>
        <div class="mini" style="margin-top:2px">Includes ${sug.underRaced} car${sug.underRaced===1?'':'s'} with the fewest races run — running this evens out participation.</div>
      </div>
      <button class="btn flag" data-race-next="${sug.race.id}">Enter this race →</button>
    </div>` : '';

  view.innerHTML = `
    <div class="flex-head">
      <div><h2 class="sec">Schedule</h2>
        <p class="lead" style="margin:0">${DB.regularCount} regular-season races, playoffs to come. Races display in date order; each keeps its original number. Edits save automatically.</p>
      </div>
      <button class="btn flag" id="addRace">+ Add race</button>
    </div>
    ${sugBanner}
    <div class="card" style="padding:6px 4px">
      <table class="data">
        <thead><tr>
          <th class="l" style="width:34px">#</th><th class="l">Track</th><th class="l">Type</th>
          <th class="l">Date</th><th class="l">Playoff</th><th class="l">Result</th><th class="l"></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  const nextBtn = view.querySelector('[data-race-next]');
  if(nextBtn) nextBtn.onclick=()=>{
    enterTargetId = nextBtn.dataset.raceNext; currentTab='enter';
    [...document.querySelectorAll('#tabs button')].forEach(x=>x.classList.toggle('on',x.dataset.tab==='enter')); render();
  };

  view.querySelectorAll('input[data-f],select[data-f]').forEach(el=>{
    el.onchange = ()=>{
      const r = DB.races.find(x=>x.id===el.dataset.id); if(!r) return;
      const f = el.dataset.f;
      r[f] = f==='phase' ? (el.checked?'playoff':'regular') : el.value;
      saveDB(); render();
    };
  });
  view.querySelectorAll('[data-goto]').forEach(b=> b.onclick=()=>{ enterTargetId=b.dataset.goto; currentTab='enter';
    [...document.querySelectorAll('#tabs button')].forEach(x=>x.classList.toggle('on',x.dataset.tab==='enter')); render(); });
  view.querySelectorAll('[data-del]').forEach(b=> b.onclick=()=>{
    if(!confirm('Remove this race and its result?')) return;
    DB.races = DB.races.filter(x=>x.id!==b.dataset.del); saveDB(); render(); toast('Race removed');
  });
  document.getElementById('addRace').onclick = ()=>{
    const n = DB.races.length+1;
    DB.races.push({id:'r'+Date.now(), name:'Race '+n, type:'short', date:'', playoff:false, results:null});
    saveDB(); render(); toast('Race added');
  };
}

/* ===== ENTER RACE ===== */
let enterTargetId = null;
function renderEnter(){
  if(!enterTargetId){
    const firstUnscored = DB.races.find(r=>!r.results);
    enterTargetId = firstUnscored ? firstUnscored.id : (DB.races[0]?.id||null);
  }
  const race = DB.races.find(r=>r.id===enterTargetId);
  if(!race){ view.innerHTML = `<div class="empty">Add a race in the Schedule tab first.</div>`; return; }

  const picker = `<select id="racePick" style="min-width:220px">
    ${sortedRaces().map(({r, num})=>`<option value="${r.id}" ${r.id===race.id?'selected':''}>${num}. ${esc(r.name)}${r.results?' ✓':''}</option>`).join('')}
  </select>`;

  if(!race.entries) race.entries = [];
  // The field = entered cars. Fall back to all active cars only if no entry list exists.
  const field = race.entries.length ? race.entries : DB.cars.filter(c=>c.active).map(c=>c.num);
  // working buffer: existing results OR blank
  const existing = {};
  if(race.results) race.results.forEach(x=> existing[x.num]={start:x.start, finish:x.finish});

  const entryRows = field.map(num=>{
    const e = existing[num]||{};
    const col = carTeamColor(num);
    const tm = DB.cars.find(x=>x.num===num);
    const teamName = tm && tm.team ? tm.team : '';
    const style = col ? `border-left:4px solid ${col};background:${hexTint(col)}` : 'border-left:4px solid transparent';
    return `<div class="entry-row" style="${style}" title="${esc(teamName)}">
      <span class="lab" ${col?`style="color:${col}"`:''}>${logoImg(num,18)}<a href="#" class="carlink" data-driver-link="${esc(num)}" style="color:inherit">#${esc(num)}</a>${carDriver(num)?`<span class="driver-name" style="margin-left:6px;font-weight:500">${esc(carDriver(num))}</span>`:''}</span>
      <div class="row" style="gap:8px">
        <input class="num" data-num="${esc(num)}" data-k="start" placeholder="St" value="${e.start??''}" inputmode="numeric">
        <input class="num" data-num="${esc(num)}" data-k="finish" placeholder="Fin" value="${e.finish??''}" inputmode="numeric">
      </div>
    </div>`;
  }).join('');

  // legend of which teams are in this race
  const teamsInRace = [...new Set(field.map(n=>{ const c=DB.cars.find(x=>x.num===n); return c&&c.team?c.team:null; }).filter(Boolean))];
  const legend = teamsInRace.length ? `<div class="row" style="gap:12px;margin-bottom:10px;flex-wrap:wrap">
    ${teamsInRace.map(tn=>{ const col=teamColor(tn); const mem=field.filter(n=>{const c=DB.cars.find(x=>x.num===n);return c&&c.team===tn;});
      return `<span class="mini" style="display:inline-flex;align-items:center;gap:6px"><span class="team-dot" style="background:${col}"></span>${esc(tn)} <span style="opacity:.6">(${mem.map(m=>'#'+m).join(', ')})</span></span>`; }).join('')}
  </div>` : '';

  view.innerHTML = `
    <div class="flex-head">
      <div><h2 class="sec">Enter Race</h2>
        <p class="lead" style="margin:0">Type each car's start and finish. Leave a car blank if it didn't run. Points auto-apply on save.</p>
      </div>
      <div class="row">${picker}</div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <div class="row" style="gap:8px">
          ${typeChip(race.type)} ${race.phase==='playoff'?'<span class="chip playoff">Playoff</span>':''}
          <span class="mini">${esc(race.name)}${race.date?` · ${esc(race.date)}`:''} · ${field.length}-car field</span>
        </div>
        <div class="mini" id="entryHint"></div>
      </div>

      <div class="divider"></div>

      <div class="row" style="margin-bottom:10px;gap:8px">
        <span class="mini" style="font-weight:600">Field:</span>
        <button class="btn ghost sm" id="editFieldBtn">Edit entered cars</button>
      </div>

      <div class="row" style="margin-bottom:6px;justify-content:space-between">
        <strong style="font-family:var(--disp);text-transform:uppercase;font-size:13px">Enter finishing positions</strong>
      </div>

      <div class="grid-entry" id="entryGrid">${entryRows}</div>

      ${legend? `<div class="divider"></div>${legend}`:''}

      <div class="divider"></div>
      <div class="row" style="justify-content:flex-end;gap:10px">
        ${race.results?`<button class="btn ghost" id="clearBtn">Clear result</button>`:''}
        <button class="btn flag" id="saveBtn">${race.results?'Update result':'Save result & score'}</button>
      </div>
    </div>

    <div id="previewWrap"></div>
  `;

  document.getElementById('racePick').onchange = e=>{ enterTargetId=e.target.value; render(); };

  function buffer(){
    const buf={};
    view.querySelectorAll('#entryGrid input').forEach(inp=>{
      const num=inp.dataset.num, k=inp.dataset.k, v=inp.value.trim();
      if(!buf[num]) buf[num]={};
      buf[num][k]= v===''? null : Number(v);
    });
    return buf;
  }
  function validate(buf){
    const finishes = [];
    Object.entries(buf).forEach(([num,o])=>{ if(o.finish!=null) finishes.push(o.finish); });
    const dupes = finishes.filter((v,i)=>finishes.indexOf(v)!==i);
    return {count:finishes.length, dupes:[...new Set(dupes)]};
  }
  function refreshHint(){
    const {count,dupes} = validate(buffer());
    const h=document.getElementById('entryHint');
    h.innerHTML = `${count} cars entered` + (dupes.length?` · <span style="color:var(--flag)">dup finish: ${dupes.join(', ')}</span>`:'');
  }
  view.querySelectorAll('#entryGrid input').forEach(inp=> inp.oninput=()=>{ refreshHint(); livePreview(); });
  refreshHint();

  function livePreview(){
    const buf = buffer();
    const list = Object.entries(buf)
      .filter(([n,o])=>o.finish!=null)
      .map(([n,o])=>({num:n, start:o.start, finish:o.finish, pts:pointsForFinish(o.finish)}))
      .sort((a,b)=>a.finish-b.finish);
    if(!list.length){ document.getElementById('previewWrap').innerHTML=''; return; }
    document.getElementById('previewWrap').innerHTML = `
      <div class="card">
        <strong style="font-family:var(--disp);text-transform:uppercase;font-size:13px">Live scoring preview</strong>
        <table class="data" style="margin-top:8px">
          <thead><tr><th class="l">Fin</th><th class="l">Car</th><th>Start</th><th>Points</th></tr></thead>
          <tbody>${list.map(r=>`<tr><td class="l pos">${r.finish}</td><td class="l">${carLink(r.num)}</td><td>${r.start??'—'}</td><td class="pts">${r.pts}</td></tr>`).join('')}</tbody>
        </table>
      </div>`;
  }
  livePreview();

  document.getElementById('editFieldBtn').onclick = ()=>{
    const raw = prompt('Cars entered in this race (comma or space separated). This sets who appears in the entry grid:', field.join(', '));
    if(raw==null) return;
    const list = raw.split(/[\s,]+/).map(s=>s.trim()).filter(Boolean);
    // auto-add any unknown car numbers to the roster so they're valid
    list.forEach(n=>{ if(!DB.cars.some(c=>c.num===n)) DB.cars.push({num:n,team:'',active:true}); });
    race.entries = list; saveDB(); render(); toast(`Field set to ${list.length} cars`);
  };

  document.getElementById('saveBtn').onclick = ()=>{
    const buf = buffer();
    const {dupes} = validate(buf);
    if(dupes.length && !confirm('Duplicate finishing positions: '+dupes.join(', ')+'. Save anyway?')) return;
    const results = Object.entries(buf)
      .filter(([n,o])=>o.finish!=null)
      .map(([n,o])=>({num:n, start:o.start, finish:o.finish}))
      .sort((a,b)=>a.finish-b.finish);
    if(!results.length){ toast('Enter at least one finish'); return; }
    race.results = results; saveDB();
    toast('Result saved — standings updated');
    currentTab='standings';
    [...document.querySelectorAll('#tabs button')].forEach(x=>x.classList.toggle('on',x.dataset.tab==='standings'));
    render();
  };
  const cb=document.getElementById('clearBtn');
  if(cb) cb.onclick=()=>{ if(confirm('Clear this race result?')){ race.results=null; saveDB(); render(); toast('Result cleared'); } };
}

/* ===== CARS ===== */
function renderCars(){
  const teamOpts = (sel)=> `<option value="">— none —</option>` +
    DB.teams.map(t=>`<option value="${esc(t.name)}" ${t.name===sel?'selected':''}>${esc(t.name)}</option>`).join('') +
    `<option value="__new__">+ New team…</option>`;
  const rows = [...DB.cars].sort((a,b)=>parseFloat(a.num)-parseFloat(b.num)).map(c=>`
    <tr>
      <td class="l">${carLink(c.num)}</td>
      <td class="l"><input data-num="${esc(c.num)}" data-f="driver" value="${esc(c.driver||'')}" placeholder="— driver name —" style="width:100%;max-width:200px"></td>
      <td class="l"><select data-num="${esc(c.num)}" data-f="team" style="width:100%;max-width:220px">${teamOpts(c.team||'')}</select></td>
      <td class="l"><label class="mini" style="cursor:pointer"><input type="checkbox" data-num="${esc(c.num)}" data-f="active" ${c.active?'checked':''}> active</label></td>
      <td class="l"><button class="btn ghost sm" data-delcar="${esc(c.num)}">✕</button></td>
    </tr>`).join('');

  view.innerHTML = `
    <div class="flex-head">
      <div><h2 class="sec">Cars</h2>
        <p class="lead" style="margin:0">The roster the league runs on. Add driver names, assign teams, and manage the field. Driver names appear across standings and race screens.</p>
      </div>
      <div class="row">
        <input id="newCar" placeholder="Car #" class="num" style="width:90px">
        <button class="btn flag" id="addCar">+ Add car</button>
      </div>
    </div>
    <div class="card" style="padding:6px 4px">
      <table class="data">
        <thead><tr><th class="l">Car</th><th class="l">Driver</th><th class="l">Team</th><th class="l">Status</th><th class="l"></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;

  view.querySelectorAll('input[data-f="driver"]').forEach(el=> el.onchange=()=>{
    setDriverName(el.dataset.num, el.value.trim()); saveDB(); render();
  });
  view.querySelectorAll('select[data-f="team"]').forEach(el=> el.onchange=()=>{
    const c=DB.cars.find(x=>x.num===el.dataset.num); if(!c) return;
    if(el.value==='__new__'){
      const name=(prompt('New team name:')||'').trim();
      if(name){ if(!teamByName(name)) DB.teams.push({name, color:TEAM_PALETTE[DB.teams.length%TEAM_PALETTE.length]}); c.team=name; }
      saveDB(); render(); return;
    }
    c.team = el.value; saveDB();
  });
  view.querySelectorAll('input[data-f="active"]').forEach(el=> el.onchange=()=>{
    const c=DB.cars.find(x=>x.num===el.dataset.num); if(!c) return;
    c.active = el.checked; saveDB(); render();
  });
  view.querySelectorAll('[data-delcar]').forEach(b=> b.onclick=()=>{
    if(!confirm('Remove car #'+b.dataset.delcar+'? (Past results keep their record.)')) return;
    DB.cars=DB.cars.filter(x=>x.num!==b.dataset.delcar); saveDB(); render(); toast('Car removed');
  });
  document.getElementById('addCar').onclick=()=>{
    const v=document.getElementById('newCar').value.trim(); if(!v) return;
    if(DB.cars.some(c=>c.num===v)){ toast('Car already exists'); return; }
    DB.cars.push({num:v,team:'',active:true}); saveDB(); render(); toast('Car #'+v+' added');
  };
}

/* ===== DRIVERS (roster tiles) ===== */
function renderDrivers(){
  const stand = {};
  computeStandings().forEach(r=> stand[r.num]=r);
  const cars = [...DB.cars]
    .filter(c=>c.active || stand[c.num])
    .map(c=>{
      const s = stand[c.num] || {pts:0,races:0,wins:0,avgFinish:null,diff:0};
      return {num:c.num, driver:c.driver||'', team:c.team||'', ...s};
    })
    .sort((a,b)=> b.pts-a.pts || b.diff-a.diff);

  const named = cars.filter(c=>c.driver).length;

  const tiles = cars.map(c=>{
    const col = carTeamColor(c.num) || 'var(--flag)';
    return `<div class="rtile" data-driver-link="${esc(c.num)}" style="border-top-color:${col}">
      <div class="rlogo">${logoImg(c.num,26)}</div>
      <div class="bignum">#${esc(c.num)}</div>
      <div class="rdriver">${c.driver? esc(c.driver) : '<span style="color:var(--muted)">Unnamed</span>'}</div>
      <div class="rteam">${c.team? esc(c.team) : '—'}</div>
      <div class="rstats">
        <div class="rstat"><b>${c.pts}</b><span>Pts</span></div>
        <div class="rstat"><b>${c.races}</b><span>Races</span></div>
        <div class="rstat"><b>${c.wins}</b><span>Wins</span></div>
        <div class="rstat"><b>${c.diff>0?'+':''}${c.diff}</b><span>Diff</span></div>
      </div>
    </div>`;
  }).join('');

  view.innerHTML = `
    <div class="flex-head">
      <div><h2 class="sec">Roster</h2>
        <p class="lead" style="margin:0">Tap any car for its full driver page — 2026 results and upcoming races. ${named} of ${cars.length} cars named; edit names on the Cars tab.</p>
      </div>
    </div>
    <div class="roster">${tiles}</div>
  `;

  view.querySelectorAll('.rtile[data-driver-link]').forEach(t=>{
    t.onclick=()=> openDriver(t.dataset.driverLink);
  });
}

/* ===== DRIVER DETAIL (ESPN-style player page) ===== */
function renderDriverDetail(num){
  const car = DB.cars.find(c=>c.num===num);
  const driver = car && car.driver ? car.driver : '';
  const team = car && car.team ? car.team : '';
  const col = carTeamColor(num) || 'var(--flag)';
  const s = computeStandings().find(r=>r.num===num);
  const rankAll = computeStandings();
  const rank = rankAll.findIndex(r=>r.num===num);

  // This car's finishes across scored races (in schedule/date order), plus upcoming entered races.
  const ordered = sortedRaces();
  const results = [], upcoming = [];
  ordered.forEach(({r,num:rn})=>{
    if(r.results){
      const res = r.results.find(x=>x.num===num);
      if(res) results.push({raceNum:rn, name:r.name, type:r.type, date:r.date, start:res.start, lap1:res.lap1, lap2:res.lap2, finish:res.finish, pts:pointsForFinish(res.finish)});
    } else if(r.entries && r.entries.includes(num)){
      upcoming.push({raceNum:rn, name:r.name, type:r.type, date:r.date});
    }
  });

  const finBadge = (f)=>{ const cls = f===1?'fin-1' : f<=5?'fin-top5':'fin-mid'; return `<span class="fin-badge ${cls}">${f}</span>`; };

  const statChips = s ? `
    <div class="stat-cards" style="margin-top:16px">
      <div class="stat" style="border-left-color:${col}"><div class="k">Season Rank</div><div class="v">${rank>=0?rank+1:'—'}<small> / ${rankAll.length}</small></div></div>
      <div class="stat" style="border-left-color:${col}"><div class="k">Points</div><div class="v">${s.pts}</div></div>
      <div class="stat" style="border-left-color:${col}"><div class="k">Wins</div><div class="v">${s.wins}</div></div>
      <div class="stat" style="border-left-color:${col}"><div class="k">Avg Finish</div><div class="v">${fmt(s.avgFinish)}</div></div>
      <div class="stat" style="border-left-color:${col}"><div class="k">Avg Start</div><div class="v">${fmt(s.avgStart)}</div></div>
      <div class="stat" style="border-left-color:${col}"><div class="k">Differential</div><div class="v">${s.diff>0?'+':''}${s.diff}</div></div>
    </div>` : `<p class="lead" style="margin-top:16px">No races scored yet this season.</p>`;

  const hasLaps = activeSeasonObj().hasLaps;
  const resultsTable = results.length ? `
    <div class="card" style="padding:6px 4px">
      <table class="data">
        <thead><tr><th class="l">Rd</th><th class="l">Race</th><th class="l">Type</th><th>Start</th>${hasLaps?'<th>Lap 1</th><th>Lap 2</th>':''}<th>Finish</th><th>Pts</th></tr></thead>
        <tbody>${results.map(x=>`<tr>
          <td class="l pos">${x.raceNum}</td>
          <td class="l">${esc(x.name)}${x.date?`<br><span class="mini">${esc(x.date)}</span>`:''}</td>
          <td class="l">${typeChip(x.type)}</td>
          <td>${x.start??'—'}</td>
          ${hasLaps?`<td>${x.lap1??'—'}</td><td>${x.lap2??'—'}</td>`:''}
          <td>${finBadge(x.finish)}</td>
          <td class="pts">${x.pts}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>` : `<p class="mini">No results recorded yet.</p>`;

  const upcomingList = upcoming.length ? `
    <div class="card" style="padding:6px 4px">
      <table class="data">
        <thead><tr><th class="l">Rd</th><th class="l">Race</th><th class="l">Type</th><th class="l">Date</th></tr></thead>
        <tbody>${upcoming.map(x=>`<tr>
          <td class="l pos">${x.raceNum}</td>
          <td class="l">${esc(x.name)}</td>
          <td class="l">${typeChip(x.type)}</td>
          <td class="l">${x.date? esc(x.date) : '<span class="mini">TBD</span>'}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>` : `<p class="mini">Not entered in any upcoming races yet.</p>`;

  // Career section — aggregate across all seasons (ESPN-style).
  const cs = careerStats(num);
  const careerSection = cs.career.races>0 ? `
    <h2 class="sec" style="font-size:20px;margin:30px 0 10px">Career</h2>
    <div class="stat-cards">
      <div class="stat" style="border-left-color:${col}"><div class="k">Seasons</div><div class="v">${cs.career.seasons}</div></div>
      <div class="stat" style="border-left-color:${col}"><div class="k">Career Races</div><div class="v">${cs.career.races}</div></div>
      <div class="stat" style="border-left-color:${col}"><div class="k">Career Wins</div><div class="v">${cs.career.wins}</div></div>
      <div class="stat" style="border-left-color:${col}"><div class="k">Career Points</div><div class="v">${cs.career.pts}</div></div>
      <div class="stat" style="border-left-color:${col}"><div class="k">Career Avg Fin</div><div class="v">${fmt(cs.career.avgFinish)}</div></div>
    </div>
    <div class="card" style="padding:6px 4px;margin-top:6px">
      <table class="data">
        <thead><tr><th class="l">Season</th><th>Races</th><th>Wins</th><th>Pts</th><th class="hide-sm">Avg St</th><th>Avg Fin</th><th>Best</th><th class="hide-sm">Diff</th></tr></thead>
        <tbody>${cs.perSeason.map(ps=>`<tr>
          <td class="l"><strong>${esc(ps.label)}</strong> <span class="mini">${esc(ps.year)}</span></td>
          <td>${ps.races}</td><td>${ps.wins}</td><td class="pts">${ps.pts}</td>
          <td class="hide-sm">${fmt(ps.avgStart)}</td><td>${fmt(ps.avgFinish)}</td>
          <td>${ps.best!=null?finBadge(ps.best):'—'}</td>
          <td class="hide-sm">${ps.diff>0?'+':''}${ps.diff}</td>
        </tr>`).join('')}
        <tr style="border-top:2px solid var(--flag)">
          <td class="l"><strong>Career</strong></td>
          <td>${cs.career.races}</td><td>${cs.career.wins}</td><td class="pts">${cs.career.pts}</td>
          <td class="hide-sm">${fmt(cs.career.avgStart)}</td><td>${fmt(cs.career.avgFinish)}</td>
          <td>—</td><td class="hide-sm">${cs.career.diff>0?'+':''}${cs.career.diff}</td>
        </tr>
        </tbody>
      </table>
    </div>` : '';

  view.innerHTML = `
    <button class="dd-back" id="ddBack">← Back to roster</button>
    <div class="dd-head" style="margin-top:6px">
      <div class="dd-num" style="color:${col!=='var(--flag)'?col:'#fff'}">#${esc(num)}</div>
      <div class="dd-meta" style="display:flex;align-items:center;gap:14px">
        ${logoImg(num,44)}
        <div>
          <h2>${driver? esc(driver) : 'Unnamed Driver'}</h2>
          <div class="mini" style="margin-top:4px">${team? `<span class="carno-pill" style="border-color:${col};color:${col}">${esc(team)}</span>`:'No team assigned'} · Viewing ${esc(activeSeasonObj().label)} (${esc(activeSeasonObj().year)})</div>
        </div>
      </div>
    </div>
    ${careerSection}
    <h2 class="sec" style="font-size:20px;margin:30px 0 10px">${esc(activeSeasonObj().label)} Results <span class="mini" style="font-style:normal">${esc(activeSeasonObj().year)}</span></h2>
    ${statChips}
    <div style="margin-top:12px"></div>
    ${resultsTable}
    ${activeSeasonObj().races.some(r=>!r.results && r.entries && r.entries.includes(num)) ? `
    <h2 class="sec" style="font-size:20px;margin:26px 0 10px">Upcoming Races</h2>
    ${upcomingList}` : ''}
  `;

  document.getElementById('ddBack').onclick=()=>{
    driverDetailNum=null; currentTab='drivers';
    [...document.querySelectorAll('#tabs button')].forEach(x=>x.classList.toggle('on',x.dataset.tab==='drivers'));
    render();
  };
}

/* ===== TEAMS ===== */
function renderTeams(){
  // combined stats per team from standings
  const stand = {};
  computeStandings().forEach(r=> stand[r.num]=r);
  const teamRows = DB.teams.map(t=>{
    const members = DB.cars.filter(c=>c.team===t.name).map(c=>c.num);
    let pts=0, wins=0, finSum=0, raceSum=0, diff=0;
    members.forEach(num=>{ const s=stand[num]; if(s){ pts+=s.pts; wins+=s.wins; diff+=s.diff;
      if(s.avgFinish!=null){ finSum+=s.avgFinish*s.races; raceSum+=s.races; } }});
    return {team:t, members, pts, wins, diff, avgFinish: raceSum? finSum/raceSum : null};
  }).sort((a,b)=> b.pts-a.pts || b.diff-a.diff);

  const unassigned = DB.cars.filter(c=>!c.team).map(c=>c.num);

  const body = teamRows.length ? teamRows.map((row,i)=>{
    const t=row.team;
    return `<tr>
      <td class="pos">${i+1}</td>
      <td class="l">
        <div class="row" style="gap:8px;align-items:center">
          <span class="team-dot" style="background:${t.color}"></span>
          ${t.logo? `<img class="team-logo" src="${t.logo}" style="width:28px;height:28px" alt="">` : `<span class="logo-ph" style="border-color:${t.color}">—</span>`}
          <input data-team-name="${esc(t.name)}" value="${esc(t.name)}" style="font-weight:600;min-width:140px">
          <input type="color" data-team-color="${esc(t.name)}" value="${t.color}" title="Team color" style="width:34px;height:30px;padding:2px;border-radius:6px;cursor:pointer">
          <label class="btn ghost sm" style="cursor:pointer;margin:0">${t.logo?'Change':'Logo'}<input type="file" accept="image/*" data-team-logo="${esc(t.name)}" style="display:none"></label>
          ${t.logo? `<button class="btn ghost sm" data-team-logo-clear="${esc(t.name)}" title="Remove logo">✕</button>`:''}
        </div>
        <div class="mini" style="margin-top:4px">${row.members.length? row.members.map(m=>`<a href="#" class="carno-pill carlink" data-driver-link="${esc(m)}" style="border-color:${t.color};color:${t.color}">#${esc(m)}</a>`).join(' ') : '<em>no cars</em>'}</div>
      </td>
      <td class="pts">${row.pts}</td>
      <td>${row.wins}</td>
      <td class="hide-sm">${fmt(row.avgFinish)}</td>
      <td class="hide-sm">${row.diff>0?'+':''}${row.diff}</td>
      <td>${row.members.length}</td>
      <td class="l"><button class="btn ghost sm" data-delteam="${esc(t.name)}">✕</button></td>
    </tr>`;
  }).join('')
    : `<tr><td colspan="8" class="empty" style="padding:26px">No teams yet. Add one below, then assign cars on the Cars tab.</td></tr>`;

  view.innerHTML = `
    <div class="flex-head">
      <div><h2 class="sec">Teams</h2>
        <p class="lead" style="margin:0">Combined points, wins, and form. Edit a name by typing in it; click the swatch to change the team's color. That color highlights teammates on the Enter Race screen.</p>
      </div>
      <div class="row">
        <input id="newTeam" placeholder="Team name" style="min-width:160px">
        <button class="btn flag" id="addTeam">+ Add team</button>
      </div>
    </div>
    <div class="card" style="padding:6px 4px">
      <table class="data">
        <thead><tr>
          <th class="l" style="width:34px">#</th><th class="l">Team · Cars</th>
          <th>Pts</th><th>Wins</th><th class="hide-sm">Avg Fin</th><th class="hide-sm">Diff</th><th>Cars</th><th class="l"></th>
        </tr></thead>
        <tbody>${body}</tbody>
      </table>
    </div>
    ${unassigned.length? `<p class="mini" style="margin-top:12px">Unassigned cars: ${unassigned.map(n=>'#'+esc(n)).join(' · ')}</p>`:''}
  `;

  // rename a team (updates every car pointing at the old name)
  view.querySelectorAll('input[data-team-name]').forEach(inp=>{
    inp.onchange=()=>{
      const oldName=inp.dataset.teamName, newName=inp.value.trim();
      if(!newName){ inp.value=oldName; return; }
      if(newName===oldName) return;
      if(teamByName(newName)){ toast('A team already has that name'); inp.value=oldName; return; }
      const t=teamByName(oldName); if(t) t.name=newName;
      DB.cars.forEach(c=>{ if(c.team===oldName) c.team=newName; });
      saveDB(); render(); toast('Team renamed');
    };
  });
  view.querySelectorAll('input[data-team-color]').forEach(inp=>{
    inp.onchange=()=>{ const t=teamByName(inp.dataset.teamColor); if(t){ t.color=inp.value; saveDB(); render(); } };
  });
  view.querySelectorAll('input[data-team-logo]').forEach(inp=>{
    inp.onchange=()=>{
      const file=inp.files[0]; if(!file) return;
      downscaleImage(file, 128, dataUrl=>{
        if(!dataUrl){ toast('Could not read that image'); return; }
        const t=teamByName(inp.dataset.teamLogo); if(t){ t.logo=dataUrl; saveDB(); render(); toast('Logo added'); }
      });
    };
  });
  view.querySelectorAll('[data-team-logo-clear]').forEach(b=> b.onclick=()=>{
    const t=teamByName(b.dataset.teamLogoClear); if(t){ delete t.logo; saveDB(); render(); toast('Logo removed'); }
  });
  document.getElementById('addTeam').onclick=()=>{
    const v=document.getElementById('newTeam').value.trim(); if(!v) return;
    if(teamByName(v)){ toast('Team already exists'); return; }
    DB.teams.push({name:v, color:TEAM_PALETTE[DB.teams.length%TEAM_PALETTE.length]});
    saveDB(); render(); toast('Team added');
  };
  view.querySelectorAll('[data-delteam]').forEach(b=> b.onclick=()=>{
    const name=b.dataset.delteam;
    if(!confirm(`Remove team "${name}"? Cars stay, but lose this team assignment.`)) return;
    DB.teams=DB.teams.filter(t=>t.name!==name);
    DB.cars.forEach(c=>{ if(c.team===name) c.team=''; });
    saveDB(); render(); toast('Team removed');
  });
}

/* ===== FIGHTS ===== */
function renderFights(){
  const opts = [...DB.cars].sort((a,b)=>parseFloat(a.num)-parseFloat(b.num))
    .map(c=>`<option value="${esc(c.num)}">#${esc(c.num)}</option>`).join('');
  // tally records
  const rec={};
  DB.fights.forEach(f=>{
    if(f.tie){ [f.winner,f.loser].forEach(n=>{ rec[n]=rec[n]||{w:0,l:0,t:0}; rec[n].t++; }); }
    else{ rec[f.winner]=rec[f.winner]||{w:0,l:0,t:0}; rec[f.winner].w++;
          rec[f.loser]=rec[f.loser]||{w:0,l:0,t:0}; rec[f.loser].l++; }
  });
  const recRows = Object.entries(rec).sort((a,b)=>b[1].w-a[1].w).map(([n,r])=>
    `<tr><td class="l">${carLink(n)}</td><td>${r.w}</td><td>${r.l}</td><td>${r.t}</td></tr>`).join('');

  const list = DB.fights.map((f,i)=>`
    <div class="fightrow">
      <span class="w">${carLink(f.winner,'carlink w')}</span>
      <span class="vs">${f.tie?'TIE':'beat'}</span>
      <span class="${f.tie?'w':'l'}" style="text-align:left">${carLink(f.loser,'carlink '+(f.tie?'w':'l'))}</span>
      <button class="btn ghost sm" data-delfight="${i}">✕</button>
    </div>`).join('');

  view.innerHTML = `
    <h2 class="sec">Fights</h2>
    <p class="lead">Head-to-head battles on the track. Log a winner and loser (or mark a tie); records tally automatically.</p>
    <div class="card">
      <div class="h2h">
        <select id="fW">${opts}</select>
        <span class="vs">vs</span>
        <select id="fL">${opts}</select>
      </div>
      <div class="row" style="margin-top:12px">
        <button class="btn flag" id="addFight">Log fight (winner → loser)</button>
        <button class="btn ghost" id="addTie">Log as tie</button>
      </div>
      <div class="fightlist">${list||'<span class="mini">No fights logged yet.</span>'}</div>
    </div>
    ${recRows?`<div class="card"><strong style="font-family:var(--disp);text-transform:uppercase;font-size:13px">Records</strong>
      <table class="data" style="margin-top:8px"><thead><tr><th class="l">Car</th><th>W</th><th>L</th><th>T</th></tr></thead>
      <tbody>${recRows}</tbody></table></div>`:''}
  `;
  document.getElementById('addFight').onclick=()=>{
    const w=document.getElementById('fW').value, l=document.getElementById('fL').value;
    if(w===l){ toast('Pick two different cars'); return; }
    DB.fights.push({winner:w,loser:l,tie:false}); saveDB(); render(); toast('Fight logged');
  };
  document.getElementById('addTie').onclick=()=>{
    const w=document.getElementById('fW').value, l=document.getElementById('fL').value;
    if(w===l){ toast('Pick two different cars'); return; }
    DB.fights.push({winner:w,loser:l,tie:true}); saveDB(); render(); toast('Tie logged');
  };
  view.querySelectorAll('[data-delfight]').forEach(b=> b.onclick=()=>{
    DB.fights.splice(Number(b.dataset.delfight),1); saveDB(); render();
  });
}

/* ===== RULES ===== */
function renderRules(){
  const rule=(t,b)=>`<details class="rulebox"><summary>${t}</summary><div class="body">${b}</div></details>`;
  view.innerHTML = `
    <h2 class="sec">Rulebook</h2>
    <p class="lead">The 2025–26 official rules. Points and bonus tables below drive the standings math.</p>
    ${rule('1 · Turn Order','<p>Cars activate in order from first place to last. Timing updates are instantaneous — pass a car via drafting before activating and you take your turn immediately.</p>')}
    ${rule('2 · Movement','<p>Roll 2d6 and subtract current speed penalties. Doubles: roll again and add. Advance that many inches with a ruler.</p>')}
    ${rule('3 · Braking','<p>After rolling, before moving, you may halve your movement.</p>')}
    ${rule('4 · Contact','<p>Touch another car\'s bumper with inches remaining → attempt a crash check (§5).</p>')}
    ${rule('5 · Crash Checks & Damage','<p>Finish moving to point of contact, end activation. Roll 2d6; if ≤ inches remaining at first contact, a crash occurs. Each involved car rolls 1d6 — higher roller is affected. Damage on 1d12: 1–2 none · 3–6 −1 · 7–9 −2 · 10–11 −3 · 12 out. Penalties stack; −4 speed eliminates.</p>')}
    ${rule('6 · Multi-Car Collisions','<p>Cars within 4" of a fresh crash finish up to that space, then roll a crash check against remaining inches. Collisions chain behind, not ahead.</p>')}
    ${rule('7 · Pushing','<p>End flush against another car and you may push instead of crashing — both move together, no crash roll. Chain contact passes damage down the line.</p>')}
    ${rule('8 · Drafting','<p>Depends on track type (§9). Trailing car is pulled by the lead; activations chain in draft order.</p>')}
    ${rule('9 · Track Types & Drafting', `<table class="data"><thead><tr><th class="l">Type</th><th class="l">Drafting</th></tr></thead><tbody>
      <tr><td class="l">${typeChip('short')}</td><td class="l">No</td></tr>
      <tr><td class="l">${typeChip('intermediate')}</td><td class="l">Straights only</td></tr>
      <tr><td class="l">${typeChip('long')}</td><td class="l">Everywhere</td></tr>
      <tr><td class="l">${typeChip('road')}</td><td class="l">Turns only (TBD)</td></tr></tbody></table>`)}
    ${rule('10 · Points System', `<table class="data"><thead><tr><th class="l">Finish</th><th>Points</th></tr></thead><tbody>
      ${Object.entries(POINTS).slice(0,12).map(([p,v])=>`<tr><td class="l">${p==1?'1st':p==2?'2nd':p==3?'3rd':p+'th'}</td><td class="pts">${v}</td></tr>`).join('')}
      <tr><td class="l">13th–16th</td><td class="pts">1</td></tr>
      <tr><td class="l">17th+</td><td class="pts">1</td></tr></tbody></table>`)}
    ${rule('11 · Season & Playoffs','<p>26 regular races, then 4 playoff races (one of each track type); top 16 drivers qualify. Points reset at playoff start, except the top-16 bonus below.</p>')}
    ${rule('12 · Top-16 Bonus', `<p>Before the playoff reset, regular-season finishers 1st–16th carry bonus points into their playoff total. Ties broken by best average finish.</p>
      <table class="data"><thead><tr><th class="l">Standing</th><th>Bonus</th></tr></thead><tbody>
      ${Object.entries(BONUS).map(([p,v])=>`<tr><td class="l">${p}</td><td class="pts">+${v}</td></tr>`).join('')}
      <tr><td class="l">11th–16th</td><td class="pts">+0</td></tr></tbody></table>`)}
    ${rule('13 · NASCAR "Choose Cone"','<p>On restarts, drivers select inside or outside lane when lining up.</p>')}
  `;
}

/* ===== DATA (export / import / reset) ===== */
function renderData(){
  view.innerHTML = `
    <h2 class="sec">Data</h2>
    <p class="lead">Everything lives in this page and saves automatically. Export to keep your Excel sheets in sync, or back up the whole league as a file.</p>
    <div class="card">
      <strong style="font-family:var(--disp);text-transform:uppercase;font-size:13px">Export</strong>
      <p class="mini" style="margin:8px 0 14px">Standings and each race as CSV (opens straight into Excel), or a full JSON backup.</p>
      <div class="row">
        <button class="btn" id="expStand">Standings CSV</button>
        <button class="btn" id="expRaces">All races CSV</button>
        <button class="btn ghost" id="expJson">Full backup (JSON)</button>
      </div>
    </div>
    <div class="card">
      <strong style="font-family:var(--disp);text-transform:uppercase;font-size:13px">Restore</strong>
      <p class="mini" style="margin:8px 0 14px">Load a previously exported JSON backup. This replaces current data.</p>
      <input type="file" id="impFile" accept="application/json">
    </div>
    <div class="card">
      <strong style="font-family:var(--disp);text-transform:uppercase;font-size:13px;color:var(--flag)">Reset</strong>
      <p class="mini" style="margin:8px 0 14px">Two options. "Clear results" keeps the roster and all 28 race fields but wipes every finish, so you start scoring fresh. "Reset to seed" restores the original roster, schedule, and races 1–4.</p>
      <div class="row">
        <button class="btn ghost" id="clearResultsBtn" style="border-color:var(--flag);color:var(--flag)">Clear all results</button>
        <button class="btn ghost" id="resetBtn" style="border-color:var(--flag);color:var(--flag)">Reset to seed data</button>
      </div>
    </div>`;

  function dl(name, text, type='text/csv'){
    const blob=new Blob([text],{type}); const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=name; a.click(); URL.revokeObjectURL(url);
  }
  document.getElementById('expStand').onclick=()=>{
    const rows=computeStandings();
    let csv='Position,Car,Points,Races,Wins,Avg Start,Avg Finish,Finish Differential\n';
    rows.forEach((r,i)=>{ csv+=`${i+1},${r.num},${r.pts},${r.races},${r.wins},${fmt(r.avgStart)},${fmt(r.avgFinish)},${r.diff}\n`; });
    dl('HWRS_Standings.csv',csv); toast('Standings exported');
  };
  document.getElementById('expRaces').onclick=()=>{
    let csv='Race,Track,Type,Playoff,Car,Start,Finish,Points\n';
    DB.races.forEach((r,i)=>{ if(!r.results) return;
      r.results.forEach(x=> csv+=`${i+1},"${r.name}",${r.type},${r.phase==='playoff'?'Y':'N'},${x.num},${x.start??''},${x.finish},${pointsForFinish(x.finish)}\n`); });
    dl('HWRS_AllRaces.csv',csv); toast('Races exported');
  };
  document.getElementById('expJson').onclick=()=>{ dl('HWRS_backup.json',JSON.stringify(DB_ROOT,null,2),'application/json'); toast('Full backup downloaded (all seasons)'); };
  document.getElementById('impFile').onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader(); rd.onload=()=>{ try{ DB_ROOT=migrateToSeasons(JSON.parse(rd.result)); saveDB(); render(); toast('League restored'); }catch(err){ toast('Invalid backup file'); } };
    rd.readAsText(f);
  };
  document.getElementById('clearResultsBtn').onclick=()=>{
    if(confirm('Clear every race result? Roster and race fields stay; all finishes are wiped.')){
      DB.races.forEach(r=> r.results=null);
      DB.fights=[];
      saveDB(); render(); toast('All results cleared');
    }
  };
  document.getElementById('resetBtn').onclick=()=>{ if(confirm('Reset ALL seasons to the original seed data (2024 + 2025-26)? This replaces everything.')){ DB_ROOT=seedRoot(); saveDB(); render(); toast('Reset complete'); } };
}

/* ---------- boot ---------- */
(async function(){
  await loadDB();
  setSyncDot(false);
  render();
})();
</script>
